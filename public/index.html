<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Xendaria - Inicio</title>
    <link rel="stylesheet" href="/src/index.css" />
  </head>
  <body class="flex flex-col min-h-screen m-0 font-sans bg-gray-50 text-gray-900">
    <nav class="bg-gray-900 text-white">
      <div class="container mx-auto flex items-center justify-between p-4">
        <a href="/" class="text-xl font-semibold tracking-wide">Xendaria</a>

        <button id="menuBtn" class="lg:hidden p-2 rounded-md hover:bg-gray-800 focus:outline-none">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 6h16M4 12h16m-7 6h7" />
          </svg>
        </button>

        <ul id="navLinks" class="hidden lg:flex space-x-6">
          <li><a href="/puntos" class="hover:text-teal-400 transition">Puntos</a></li>
          <li><a href="/usuarios" class="hover:text-teal-400 transition">Usuarios</a></li>
        </ul>
      </div>
    </nav>
    <main class="flex-grow">
      <div class="container mx-auto py-12 px-4 grid gap-8 md:grid-cols-2">
        <div class="bg-white rounded-2xl shadow-xl text-center p-8 flex flex-col items-center hover:-translate-y-1 transition">
          <div class="text-5xl text-teal-500 mb-4">
            <i class="bi bi-geo-alt-fill"></i>
          </div>
          <h2 class="text-2xl font-semibold mb-3">Puntos de Visita</h2>
          <p class="text-gray-500 mb-6">Explora los puntos más interesantes y categorizados de la ciudad.</p>
          <a href="/puntos" class="bg-teal-500 text-white px-6 py-3 rounded-lg text-lg font-medium hover:bg-teal-600 transition">Ir a Puntos</a>
        </div>
        <div class="bg-white rounded-2xl shadow-xl text-center p-8 flex flex-col items-center hover:-translate-y-1 transition">
          <div class="text-5xl text-emerald-500 mb-4">
            <i class="bi bi-people-fill"></i>
          </div>
          <h2 class="text-2xl font-semibold mb-3">Usuarios</h2>
          <p class="text-gray-500 mb-6">Administra los usuarios y sus lugares favoritos.</p>
          <a href="/usuarios" class="bg-emerald-500 text-white px-6 py-3 rounded-lg text-lg font-medium hover:bg-emerald-600 transition">Ir a Usuarios</a>
        </div>
      </div>
    </main>
    <footer class="bg-gray-900 text-gray-300 mt-auto w-full">
      <div class="container mx-auto py-6 px-4 flex flex-col md:flex-row justify-between items-center gap-3 text-sm">
        <span>© 2025 Xendaria — Alexandra Rivero Sol Cumicich — DWN4AP</span>
        <div class="flex items-center gap-4 text-lg">
          <a href="https://www.instagram.com/" target="_blank" rel="noopener" class="hover:text-teal-400">
            <i class="bi bi-instagram"></i>
          </a>
          <a href="https://www.tiktok.com/" target="_blank" rel="noopener" class="hover:text-teal-400">
            <i class="bi bi-tiktok"></i>
          </a>
        </div>
      </div>
    </footer>
    <script>
      document.getElementById("menuBtn").addEventListener("click", () => {
        const links = document.getElementById("navLinks");
        links.classList.toggle("hidden");
      });
    </script>
  </body>
</html>
